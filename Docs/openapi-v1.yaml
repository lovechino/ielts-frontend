openapi: 3.0.3
info:
  title: IELTS Learning Platform API
  description: API for IELTS Learning Platform with AI-powered scoring and tutoring.
  version: 1.0.0
servers:
  - url: http://localhost:8000/api/v1
    description: Local development server
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
  /auth/login:
    post:
      summary: User login
      responses:
        '200':
          description: Successful login
        '401':
          description: Unauthorized
